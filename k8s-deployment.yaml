apiVersion: apps/v1
kind: Deployment
metadata:
  name: myfirstapp-deployment
  labels:
    app: myfirstapp
spec:
  replicas: 2
  selector:
    matchLabels:
      app: myfirstapp
  template:
    metadata:
      labels:
        app: myfirstapp
    spec:
      containers:
      - name: myfirstapp
        image: bnuthana/my-firstapp:latest
        ports:
        - containerPort: 8081
        resources:
          limits:
            memory: "512Mi"
            cpu: "500m"
          requests:
            memory: "256Mi"
            cpu: "250m"
---
apiVersion: v1
kind: Service
metadata:
  name: myfirstapp-service
spec:
  type: LoadBalancer
  selector:
    app: myfirstapp
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8081
